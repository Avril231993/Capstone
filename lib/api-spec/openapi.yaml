openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Intelligent Class Scheduling and Faculty Loading System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: courses
    description: Course management
  - name: faculty
    description: Faculty management
  - name: rooms
    description: Room management
  - name: timeslots
    description: Time slot management
  - name: schedules
    description: Schedule management
  - name: stats
    description: Dashboard statistics and reports
  - name: school-years
    description: School year lifecycle management
  - name: year-levels
    description: Year level and section management
  - name: sections
    description: Section management
  - name: loi
    description: Letter of Intent processing
  - name: faculty-specializations
    description: Faculty specialization management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all courses
      parameters:
        - name: department
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseBody"
      responses:
        "201":
          description: Created course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseBody"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /faculty:
    get:
      operationId: listFaculty
      tags: [faculty]
      summary: List all faculty members
      parameters:
        - name: department
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of faculty
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faculty"
    post:
      operationId: createFaculty
      tags: [faculty]
      summary: Create a faculty member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFacultyBody"
      responses:
        "201":
          description: Created faculty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faculty"

  /faculty/{id}:
    get:
      operationId: getFaculty
      tags: [faculty]
      summary: Get a faculty member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Faculty member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faculty"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateFaculty
      tags: [faculty]
      summary: Update a faculty member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFacultyBody"
      responses:
        "200":
          description: Updated faculty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faculty"
    delete:
      operationId: deleteFaculty
      tags: [faculty]
      summary: Delete a faculty member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List all rooms
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [lecture, lab, computer, seminar, gym]
        - name: minCapacity
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomBody"
      responses:
        "201":
          description: Created room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{id}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get a room by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateRoom
      tags: [rooms]
      summary: Update a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomBody"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
    delete:
      operationId: deleteRoom
      tags: [rooms]
      summary: Delete a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /timeslots:
    get:
      operationId: listTimeslots
      tags: [timeslots]
      summary: List all time slots
      responses:
        "200":
          description: List of time slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Timeslot"
    post:
      operationId: createTimeslot
      tags: [timeslots]
      summary: Create a time slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimeslotBody"
      responses:
        "201":
          description: Created time slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timeslot"

  /timeslots/{id}:
    delete:
      operationId: deleteTimeslot
      tags: [timeslots]
      summary: Delete a time slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List all schedule entries
      parameters:
        - name: semester
          in: query
          schema:
            type: string
        - name: academicYear
          in: query
          schema:
            type: string
        - name: facultyId
          in: query
          schema:
            type: integer
        - name: roomId
          in: query
          schema:
            type: integer
        - name: day
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of schedule entries with related data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEntry"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create a schedule entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleBody"
      responses:
        "201":
          description: Created schedule entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEntry"
        "409":
          description: Conflict detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schedules/{id}:
    get:
      operationId: getSchedule
      tags: [schedules]
      summary: Get a schedule entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEntry"
    put:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update a schedule entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleBody"
      responses:
        "200":
          description: Updated schedule entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEntry"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete a schedule entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /schedules/conflicts:
    get:
      operationId: getConflicts
      tags: [schedules]
      summary: Get all scheduling conflicts
      parameters:
        - name: semester
          in: query
          schema:
            type: string
        - name: academicYear
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of conflicts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conflict"

  /schedules/suggestions:
    post:
      operationId: getAiSuggestions
      tags: [schedules]
      summary: Get AI-powered schedule adjustment suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestionsRequestBody"
      responses:
        "200":
          description: AI suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsResponse"

  /schedules/generate:
    post:
      operationId: generateSchedule
      tags: [schedules]
      summary: Auto-generate a complete schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScheduleBody"
      responses:
        "200":
          description: Generated schedule entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateScheduleResponse"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Get dashboard overview statistics
      parameters:
        - name: semester
          in: query
          schema:
            type: string
        - name: academicYear
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewStats"

  /stats/faculty-loads:
    get:
      operationId: getFacultyLoads
      tags: [stats]
      summary: Get all faculty loading reports
      parameters:
        - name: semester
          in: query
          schema:
            type: string
        - name: academicYear
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Faculty load reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacultyLoadReport"

  /stats/room-utilization:
    get:
      operationId: getRoomUtilization
      tags: [stats]
      summary: Get room utilization statistics
      parameters:
        - name: semester
          in: query
          schema:
            type: string
        - name: academicYear
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Room utilization stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoomUtilizationReport"

  /school-years:
    get:
      operationId: listSchoolYears
      tags: [school-years]
      summary: List all school years
      responses:
        "200":
          description: List of school years
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SchoolYear"
    post:
      operationId: createSchoolYear
      tags: [school-years]
      summary: Create a new school year
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchoolYearBody"
      responses:
        "201":
          description: Created school year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolYear"

  /school-years/archive:
    post:
      operationId: archiveSchoolYear
      tags: [school-years]
      summary: Archive a school year and initialize a new one
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchiveSchoolYearBody"
      responses:
        "200":
          description: Archive result
          content:
            application/json:
              schema:
                type: object

  /school-years/{id}:
    delete:
      operationId: deleteSchoolYear
      tags: [school-years]
      summary: Delete a school year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /year-levels:
    get:
      operationId: listYearLevels
      tags: [year-levels]
      summary: List all year levels with their sections
      responses:
        "200":
          description: List of year levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YearLevel"
    post:
      operationId: createYearLevel
      tags: [year-levels]
      summary: Create a year level and auto-generate sections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateYearLevelBody"
      responses:
        "201":
          description: Created year level with sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YearLevel"

  /year-levels/{id}:
    put:
      operationId: updateYearLevel
      tags: [year-levels]
      summary: Update a year level
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateYearLevelBody"
      responses:
        "200":
          description: Updated year level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YearLevel"
    delete:
      operationId: deleteYearLevel
      tags: [year-levels]
      summary: Delete a year level (cascades sections)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /faculty/{id}/specializations:
    get:
      operationId: listFacultySpecializations
      tags: [faculty-specializations]
      summary: List specializations for a faculty member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Specializations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacultySpecialization"
    post:
      operationId: addFacultySpecialization
      tags: [faculty-specializations]
      summary: Add a specialization to a faculty member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFacultySpecializationBody"
      responses:
        "201":
          description: Created specialization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacultySpecialization"

  /faculty/{id}/specializations/{specId}:
    delete:
      operationId: deleteFacultySpecialization
      tags: [faculty-specializations]
      summary: Remove a specialization from a faculty member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: specId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /faculty/{id}/availability:
    get:
      operationId: getFacultyAvailability
      tags: [faculty-specializations]
      summary: Get availability for a faculty member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Availability records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacultyAvailability"

  /loi:
    get:
      operationId: listLoiDocuments
      tags: [loi]
      summary: List all LOI documents
      responses:
        "200":
          description: LOI documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoiDocument"
    post:
      operationId: processLoi
      tags: [loi]
      summary: Process a Letter of Intent using AI extraction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessLoiBody"
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoiExtractionResult"

  /loi/{id}:
    get:
      operationId: getLoiDocument
      tags: [loi]
      summary: Get a specific LOI document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: LOI document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoiDocument"
    delete:
      operationId: deleteLoiDocument
      tags: [loi]
      summary: Delete an LOI document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /loi/{id}/apply:
    post:
      operationId: applyLoiExtraction
      tags: [loi]
      summary: Apply extracted LOI data to update faculty profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application result
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    Course:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        department:
          type: string
        units:
          type: integer
        section:
          type: string
        enrollmentCount:
          type: integer
        description:
          type: string
        createdAt:
          type: string
      required: [id, code, name, department, units, section, enrollmentCount, createdAt]

    CreateCourseBody:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        department:
          type: string
        units:
          type: integer
        section:
          type: string
        enrollmentCount:
          type: integer
        description:
          type: string
      required: [code, name, department, units, section, enrollmentCount]

    UpdateCourseBody:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        department:
          type: string
        units:
          type: integer
        section:
          type: string
        enrollmentCount:
          type: integer
        description:
          type: string

    Faculty:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        department:
          type: string
        specialization:
          type: string
        rank:
          type: string
          enum: [instructor, assistant_professor, associate_professor, professor, part_time]
        maxUnits:
          type: integer
        createdAt:
          type: string
      required: [id, name, email, department, rank, maxUnits, createdAt]

    CreateFacultyBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        department:
          type: string
        specialization:
          type: string
        rank:
          type: string
          enum: [instructor, assistant_professor, associate_professor, professor, part_time]
        maxUnits:
          type: integer
      required: [name, email, department, rank, maxUnits]

    UpdateFacultyBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        department:
          type: string
        specialization:
          type: string
        rank:
          type: string
          enum: [instructor, assistant_professor, associate_professor, professor, part_time]
        maxUnits:
          type: integer

    Room:
      type: object
      properties:
        id:
          type: integer
        roomNumber:
          type: string
        building:
          type: string
        capacity:
          type: integer
        type:
          type: string
          enum: [lecture, lab, computer, seminar, gym]
        features:
          type: string
        createdAt:
          type: string
      required: [id, roomNumber, building, capacity, type, createdAt]

    CreateRoomBody:
      type: object
      properties:
        roomNumber:
          type: string
        building:
          type: string
        capacity:
          type: integer
        type:
          type: string
          enum: [lecture, lab, computer, seminar, gym]
        features:
          type: string
      required: [roomNumber, building, capacity, type]

    UpdateRoomBody:
      type: object
      properties:
        roomNumber:
          type: string
        building:
          type: string
        capacity:
          type: integer
        type:
          type: string
          enum: [lecture, lab, computer, seminar, gym]
        features:
          type: string

    Timeslot:
      type: object
      properties:
        id:
          type: integer
        day:
          type: string
          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday]
        startTime:
          type: string
        endTime:
          type: string
        label:
          type: string
      required: [id, day, startTime, endTime, label]

